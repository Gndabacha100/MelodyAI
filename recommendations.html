<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
:root {
    --accent: #14f1c6;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at 30% 20%, #0f3d2e, #050505);
    color: white;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 60px 20px;
}

.panel {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1);
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    margin-bottom: 20px;
    position: relative;
}

h1::after {
    content: "";
    width: 60px;
    height: 3px;
    background: var(--accent);
    position: absolute;
    bottom: -8px;
    left: 0;
}

.track {
    display: flex;
    align-items: center;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease forwards;
    opacity: 0;
}

.track:nth-child(1){animation-delay:0.1s;}
.track:nth-child(2){animation-delay:0.2s;}
.track:nth-child(3){animation-delay:0.3s;}
.track:nth-child(4){animation-delay:0.4s;}
.track:nth-child(5){animation-delay:0.5s;}

.track:hover {
    background: rgba(255,255,255,0.08);
    transform: translateX(8px);
}

.track::before {
    content: "";
    position: absolute;
    left: 0;
    width: 3px;
    height: 0%;
    background: var(--accent);
    transition: 0.3s;
}

.track:hover::before {
    height: 100%;
}

.num {
    font-size: 2rem;
    opacity: 0.1;
    width: 40px;
}

.cover {
    width: 50px;
    height: 50px;
    border-radius: 10px;
    margin-right: 12px;
}

.song {
    font-weight: 600;
}

.artist {
    font-size: 0.85rem;
    opacity: 0.6;
}

.play {
    margin-left: auto;
    opacity: 0;
    transition: 0.3s;
}

.track:hover .play {
    opacity: 1;
}

@keyframes fadeUp {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
</style>
</head>

<body>

<div class="container">
    <div class="panel">
        <h1>Your Selected Songs 🎧</h1>
        <div id="list"></div>
    </div>
</div>
<script>

document.addEventListener('DOMContentLoaded', async () => {

    // GET SELECTED SONGS
    const selectedSongs = JSON.parse(
        localStorage.getItem('selectedSongs') || '[]'
    );

    // FETCH SONGS
    const res = await fetch('/api/songs');

    const data = await res.json();

    // FILTER SELECTED SONGS
    const songs = data.songs.filter(song =>
        selectedSongs.includes(song.name)
    );

    const list = document.getElementById('list');

    list.innerHTML = '';

    songs.forEach((s, i) => {

        const el = document.createElement('div');

        el.className = "track";

        el.innerHTML = `

            <div class="num">
                ${String(i + 1).padStart(2, '0')}
            </div>

            <img 
                src="/static/images/default.jpg"
                class="cover"
            >

            <div>

                <div class="song">
                    ${s.name}
                </div>

                <div class="artist">
                    ${s.artist}
                </div>

            </div>

            <div class="play">
                ▶
            </div>
        `;

        // CLICK SONG
        el.onclick = async () => {

            // FETCH RANDOM SONGS
            const response = await fetch(
                '/api/random-recommendations'
            );

            const result = await response.json();

            // SAVE RECOMMENDATIONS
            localStorage.setItem(
                'mlRecommendations',
                JSON.stringify(
                    result.recommendations
                )
            );

            // REDIRECT
            window.location.href = "/main";
        };

        list.appendChild(el);
    });

});

</script>


</body>
</html>
